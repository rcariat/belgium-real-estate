services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: real_estate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - DB_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/real_estate
    command: >
      python etl_pipeline.py 
      --data-dir /app/data 
      --db-url postgresql+psycopg2://postgres:postgres@postgres:5432/real_estate

volumes:
  postgres_data: